<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>오늘의 학교생활 체크</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#FFF8F0;}
  .pastel-card{background:#fff;border:2px solid #FFE5D9;border-radius:1.25rem;box-shadow:0 4px 0 #FCD5CE}
  .toast{position:fixed;left:50%;top:1rem;transform:translateX(-50%);background:#333;color:#fff;padding:.6rem 1rem;border-radius:.75rem;z-index:50;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const firebaseConfig = {
  apiKey: "AIzaSyCn8tqQqUnzf0GruEqExMcUOyqJUe14z_I",
  authDomain: "school-check-f9d0a.firebaseapp.com",
  databaseURL: "https://school-check-f9d0a-default-rtdb.firebaseio.com",
  projectId: "school-check-f9d0a",
  storageBucket: "school-check-f9d0a.firebasestorage.app",
  messagingSenderId: "256211323289",
  appId: "1:256211323289:web:d437ab73d12c002bc6ab08"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

const { useState, useEffect } = React;

function App(){
  const [ready, setReady] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    const ref = db.ref('/');
    // 연결 시도 및 에러 감지
    ref.on('value', (snap) => {
      console.log("연결 성공!");
      setReady(true);
    }, (err) => {
      console.error("연결 에러:", err);
      setError(err.message);
    });
    return () => ref.off();
  }, []);

  if (error) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center">
        <div className="text-5xl mb-4">⚠️</div>
        <h2 className="text-2xl font-bold text-red-600 mb-2">연결에 실패했습니다</h2>
        <p className="bg-red-50 p-4 rounded-xl border border-red-200 text-sm font-mono break-all max-w-md">
          에러 내용: {error}
        </p>
        <div className="mt-6 text-left text-sm text-gray-600 space-y-2">
          <p><b>해결 방법:</b></p>
          <p>1. Firebase 콘솔에서 <b>Realtime Database</b>를 생성했는지 확인하세요.</p>
          <p>2. <b>Rules(규칙)</b> 탭에서 <code>".read": true, ".write": true</code>로 고치고 [게시]를 눌렀는지 확인하세요.</p>
        </div>
      </div>
    );
  }

  if (!ready) return <div className="min-h-screen flex items-center justify-center text-xl font-bold p-8">서버와 연결 중... ☁️</div>;

  return (
    <div className="p-8 text-center">
      <h1 className="text-3xl font-bold text-green-600">✅ 연결 성공!</h1>
      <p className="mt-4">이제 정상적으로 앱을 이용하실 수 있습니다.</p>
      <button onClick={() => window.location.reload()} className="mt-6 px-6 py-2 bg-pink-300 rounded-xl font-bold">새로고침해서 시작하기</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
