/* ---------- 1) 유틸: SHA-256, 날짜 ---------- */
async function sha256(str){
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 📌 기존 localStorage는 이제 '기기 종속적인' 정보(세션, 로그인 실패 횟수)에만 사용합니다.
const Local = {
  get:(k,d=null)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{return d;} },
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  del:(k)=>localStorage.removeItem(k)
};

// 📌 [신규] 실시간 동기화를 위한 전역 스토어 (Firebase 연동)
const Store = {
  data: {},
  listeners: {},
  subscribe: (k, fn) => {
    if(!Store.listeners[k]) Store.listeners[k] = [];
    Store.listeners[k].push(fn);
    return () => { Store.listeners[k] = Store.listeners[k].filter(f=>f!==fn); };
  },
  get: (k, d=null) => Store.data[k] !== undefined ? Store.data[k] : d,
  set: async (k, v) => {
    // 깊은/얕은 복사로 참조 변경 트리거
    const newValue = (typeof v === 'object' && v !== null) ? (Array.isArray(v) ? [...v] : {...v}) : v;
    Store.data[k] = newValue;
    if(Store.listeners[k]) Store.listeners[k].forEach(fn => fn(newValue));
    if(window.dbRef) {
      try { await window.dbRef.doc(k).set({ value: newValue }, { merge: false }); } 
      catch(e) { console.error('Firestore 저장 에러:', e); }
    }
  }
};

// Firestore 최초 로드 및 실시간 감지 세팅
async function initStore() {
  try {
    const snap = await window.dbRef.get();
    snap.forEach(doc => { Store.data[doc.id] = doc.data().value; });
    
    window.dbRef.onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if(change.type === 'added' || change.type === 'modified') {
          const k = change.doc.id;
          const v = change.doc.data().value;
          Store.data[k] = v;
          if(Store.listeners[k]) Store.listeners[k].forEach(fn => fn(v));
        }
      });
    });
  } catch(e) { console.error("Firebase 초기화 에러:", e); }
}

// 📌 [신규] 특정 키값의 실시간 변경을 감지하는 React 훅
function useSync(k, def) {
  const [val, setVal] = useState(() => Store.get(k, def));
  useEffect(() => {
    setVal(Store.get(k, def)); // 혹시 마운트 사이 변경된 값 캡처
    return Store.subscribe(k, setVal);
  }, [k]);
  return [val, (v) => Store.set(k, v)];
}

const todayStr = (d=new Date())=>{
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const dayKor = ['일','월','화','수','목','금','토'];
const weekKeys = ['mon','tue','wed','thu','fri'];
const weekLabel = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금'};
const nowHM = ()=>{ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const isoToLocalHM = (iso)=>{ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const hmToMin = (hm)=>{ if(!hm) return 0; const [h,m]=hm.split(':').map(Number); return h*60+m; };
const isoToLocalYMDHM = (iso) => {
  if (!iso) return '-'; const d = new Date(iso); if (isNaN(d)) return '-';
  const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0'); const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0'); return `${y}-${m}-${dd} ${h}:${min}`;
};

/* ---------- 3) 토스트 훅 ---------- */
function useToast(){
  const [msg,setMsg]=useState('');
  const show=(m)=>{ setMsg(m); setTimeout(()=>setMsg(''),1600); };
  const view = msg ? <div className="toast">{msg}</div> : null;
  return [show, view];
}

      <div className="text-xl font-bold text-gray-600">서버와 연결하는 중...</div>
    </div>
  );
  return <App />;
}

function App(){
  const [session,setSession]=useState(Local.get('session'));
  const [view,setView]=useState('role'); 
  const [tmpStudent,setTmpStudent]=useState(null);
  const [toast,toastView]=useToast();

  // 세션 복원
  useEffect(()=>{
    const s = Local.get('session');
    if(!s){ setView('role'); return; }
    const now = Date.now();
    if(s.keepLogin){ if(now - s.loginAtMs > 30*24*3600*1000){ logout(); return; } }
    else { if(now - (s.lastActiveMs||s.loginAtMs) > 30*60*1000){ logout(); return; } }
    setSession(s);
    setView(s.role==='teacher' ? 'teacherApp' : 'studentApp');
  },[]);

  const logout = ()=>{ Local.del('session'); setSession(null); setView('role'); };
  const touch = ()=>{ const s=Local.get('session'); if(s){ s.lastActiveMs=Date.now(); Local.set('session',s); } };
  useEffect(()=>{
    const h=()=>touch();
    window.addEventListener('click',h); window.addEventListener('keydown',h);
    return ()=>{ window.removeEventListener('click',h); window.removeEventListener('keydown',h); };
  },[]);

  return (
    <div className="min-h-screen">
      {toastView}
      {view==='role' && <RoleSelect onPick={(r)=>setView(r==='student'?'studentLogin':'teacherLogin')} />}
      {view==='studentLogin' && <StudentLogin
          onBack={()=>setView('role')}
          onLogged={(stu, sess)=>{
            Local.set('session', sess); setSession(sess);
            if(!stu.isPinChanged){ setTmpStudent(stu); setView('pinChange'); }
            else setView('studentApp');
          }}
          toast={toast}
      />}
      {view==='pinChange' && <PinChange student={tmpStudent}
          onDone={()=>{ setTmpStudent(null); setView('studentApp'); toast('환영해요! 🎉'); }} toast={toast}/>}
      {view==='teacherLogin' && <TeacherLogin
          onBack={()=>setView('role')}
          onLogged={(sess)=>{ Local.set('session',sess); setSession(sess); setView('teacherApp'); }}
          toast={toast}
      />}
      {view==='studentApp' && session && <StudentApp session={session} logout={logout} toast={toast}/>}
      {view==='teacherApp' && session && <TeacherApp session={session} logout={logout} toast={toast}/>}
    </div>
  );
}

/* ---------- 6) 학생 로그인 ---------- */
function StudentLogin({onBack,onLogged,toast}){
  const [cls, setCls] = useSync('class');
  const [picked,setPicked]=useState(null);
  const [pin,setPin]=useState('');
  const [keep,setKeep]=useState(false);
  const [fails,setFails]=useState(Local.get('loginFails')||{});
  const lockKey = picked ? `s${picked.id}` : null;
  const lockedUntil = lockKey ? (fails[lockKey]?.lockedUntil||0) : 0;
  const isLocked = Date.now()<lockedUntil;
  const [tick,setTick]=useState(0);
  useEffect(()=>{ if(isLocked){ const t=setInterval(()=>setTick(x=>x+1),500); return ()=>clearInterval(t); } },[isLocked]);

  const tryLogin = async ()=>{
    if(pin.length!==4){ toast('PIN 4자리를 입력해요'); return; }
    const h = await sha256(pin);
    if(h===picked.pinHash){
      const cls2 = {...cls};
      const idx = cls2.students.findIndex(s=>s.id===picked.id);
      cls2.students[idx].lastLogin = new Date().toISOString();
      setCls(cls2); // 실시간 동기화
      
      const f={...fails}; delete f[lockKey]; Local.set('loginFails',f); setFails(f);
      const sess = {role:'student', studentId:picked.id, loginAt:new Date().toISOString(),
                    loginAtMs:Date.now(), lastActiveMs:Date.now(), keepLogin:keep};
      onLogged(cls2.students[idx], sess);
    } else {
      const f={...fails};
      const cur = f[lockKey]||{count:0};
      cur.count = (cur.count||0)+1;
      if(cur.count>=5){ cur.lockedUntil = Date.now()+30000; cur.count=0; toast('5회 실패! 30초 잠금 🔒'); }
      else toast(`PIN이 달라요. 다시 입력해보세요! (${cur.count}/5)`);
      f[lockKey]=cur; Local.set('loginFails',f); setFails(f);
      setPin('');
    }
  };

  return (
    <div className="min-h-screen p-4 max-w-3xl mx-auto">
      <button onClick={onBack} className="mb-3 text-gray-600">← 처음으로</button>
      <h2 className="text-2xl font-bold mb-3">🧒 학생 로그인 — {cls?.name}</h2>
      {!picked ? (
        <div>
          <p className="mb-3 text-gray-700">내 이름을 골라주세요!</p>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {[...cls.students].sort((a,b)=>a.number-b.number).map(s=>(
              <button key={s.id} onClick={()=>setPicked(s)} className="pastel-card p-4 text-left hover:bg-pink-50">
                <div className="text-4xl">{s.avatar||'🙂'}</div>
                <div className="text-xs text-gray-500">{s.number}번</div>
                <div className="text-lg font-bold">{s.name}</div>
              </button>
            ))}
          </div>
        </div>
      ) : (
        <div>
          <div className="pastel-card p-4 mb-4 flex items-center gap-3">
            <div className="text-4xl">{picked.avatar||'🙂'}</div>
            <div className="flex-1">
              <div className="text-xs text-gray-500">{picked.number}번</div>
              <div className="text-xl font-bold">{picked.name}</div>
            </div>
            <button onClick={()=>{setPicked(null);setPin('');}} className="text-gray-500 text-sm">바꾸기</button>
          </div>
          <div className="text-center text-3xl tracking-widest my-3 h-10">{('●'.repeat(pin.length)).padEnd(4,'○')}</div>
          {isLocked ? (
            <div className="text-center text-red-500 my-4">🔒 잠시 멈췄어요. {Math.ceil((lockedUntil-Date.now())/1000)}초 후 다시 시도해 주세요.</div>
          ) : (
            <div className="grid grid-cols-3 gap-2 max-w-xs mx-auto">
              {[1,2,3,4,5,6,7,8,9].map(n)=><button key={n} className="btn-pad" onClick={()=>setPin(p=>p.length<4?p+n:p)}>{n}</button>)}
              <button className="btn-pad" onClick={()=>setPin('')}>지움</button>
              <button className="btn-pad" onClick={()=>setPin(p=>p.length<4?p+'0':p)}>0</button>
              <button className="btn-pad" onClick={()=>setPin(p=>p.slice(0,-1))}>←</button>
            </div>
          )}
          <label className="flex items-center gap-2 mt-4"><input type="checkbox" checked={keep} onChange={e=>setKeep(e.target.checked)} /><span>로그인 상태 유지 (30일)</span></label>
          <button disabled={isLocked || pin.length!==4} onClick={tryLogin} className="w-full mt-4 py-4 rounded-2xl bg-pink-300 disabled:bg-gray-200 text-lg font-bold">로그인</button>
        </div>
      )}
    </div>
  );
}

/* ---------- 7) 학생 PIN 변경 ---------- */
function PinChange({student,onDone,toast}){
  const [cls, setCls] = useSync('class');
  const [step,setStep]=useState(1);
  const [pin1,setPin1]=useState(''); const [pin2,setPin2]=useState('');
  const [avatar,setAvatar]=useState(student.avatar||'🐱');
  const cur = step===1?pin1:pin2;
  const setCur = step===1?setPin1:setPin2;

  const next = async ()=>{
    if(step===1){ if(pin1.length!==4){toast('4자리를 입력해주세요');return;} setStep(2); }
    else if(step===2){
      if(pin1!==pin2){ toast('두 PIN이 달라요!'); setPin2(''); return; }
      setStep(3);
    } else {
      const clsCopy = {...cls};
      const i = clsCopy.students.findIndex(s=>s.id===student.id);
      clsCopy.students[i].pinHash = await sha256(pin1);
      clsCopy.students[i].isPinChanged = true;
      clsCopy.students[i].avatar = avatar;
      setCls(clsCopy);
      onDone();
    }
  };

  if(step===3){
    return (
      <div className="min-h-screen p-6 max-w-md mx-auto">
        <h2 className="text-2xl font-bold mb-2">🎨 내 아바타를 골라요!</h2>
        <div className="grid grid-cols-4 gap-3 my-4">
          {AVATARS.map(a=><button key={a} onClick={()=>setAvatar(a)} className={`text-4xl p-3 rounded-2xl border-2 ${avatar===a?'bg-yellow-100 border-yellow-400':'bg-white border-gray-200'}`}>{a}</button>)}
        </div>
        <button onClick={next} className="w-full py-4 rounded-2xl bg-pink-300 font-bold text-lg">완료!</button>
      </div>
    );
  }
  return (
    <div className="min-h-screen p-6 max-w-md mx-auto">
      <h2 className="text-2xl font-bold mb-1">🔐 PIN을 새로 만들어요</h2>
      <p className="text-gray-600 mb-3">{step===1?'새 PIN 4자리':'다시 한 번 입력해 확인할게요'}</p>
      <div className="text-center text-3xl tracking-widest my-3 h-10">{('●'.repeat(cur.length)).padEnd(4,'○')}</div>
      <div className="grid grid-cols-3 gap-2 max-w-xs mx-auto">
        {[1,2,3,4,5,6,7,8,9].map(n)=><button key={n} className="btn-pad" onClick={()=>setCur(p=>p.length<4?p+n:p)}>{n}</button>)}
        <button className="btn-pad" onClick={()=>setCur('')}>지움</button>
        <button className="btn-pad" onClick={()=>setCur(p=>p.length<4?p+'0':p)}>0</button>
        <button className="btn-pad" onClick={()=>setCur(p=>p.slice(0,-1))}>←</button>
      </div>
      <button disabled={cur.length!==4} onClick={next} className="w-full mt-4 py-4 rounded-2xl bg-pink-300 disabled:bg-gray-200 font-bold text-lg">{step===1?'다음':'확인'}</button>
    </div>
  );
}

/* ---------- 8) 선생님 로그인 ---------- */
function TeacherLogin({onBack,onLogged,toast}){
  const [cls] = useSync('class');
  const [pw,setPw]=useState('');
  const fails = Local.get('loginFails')||{};
  const lockedUntil = fails['teacher']?.lockedUntil||0;
  const isLocked = Date.now()<lockedUntil;
  const [,force]=useState(0); useEffect(()=>{ if(isLocked){const t=setInterval(()=>force(x=>x+1),500); return ()=>clearInterval(t);}},[isLocked]);

  const submit = async ()=>{
    if(pw.length<6){toast('6자 이상 입력해주세요');return;}
    const h = await sha256(pw);
    if(h===cls.teacherPasswordHash){
      const f=Local.get('loginFails')||{}; delete f['teacher']; Local.set('loginFails',f);
      onLogged({role:'teacher',loginAt:new Date().toISOString(),loginAtMs:Date.now(),lastActiveMs:Date.now(),keepLogin:false});
    } else {
      const f=Local.get('loginFails')||{}; const cur=f['teacher']||{count:0};
      cur.count=(cur.count||0)+1;
      if(cur.count>=5){cur.lockedUntil=Date.now()+30000;cur.count=0;toast('5회 실패! 30초 잠금');}
      else toast(`비밀번호가 달라요 (${cur.count}/5)`);
      f['teacher']=cur; Local.set('loginFails',f); setPw('');
    }
  };
  return (
    <div className="min-h-screen p-6 max-w-md mx-auto">
      <button onClick={onBack} className="mb-3 text-gray-600">← 처음으로</button>
      <h2 className="text-2xl font-bold mb-3">👩‍🏫 선생님 로그인</h2>
      <div className="pastel-card p-4">
        <p className="text-gray-700 mb-2">학급: <b>{cls?.name}</b></p>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호" className="w-full p-3 border-2 rounded-xl"/>
        {isLocked && <div className="text-red-500 mt-2">🔒 {Math.ceil((lockedUntil-Date.now())/1000)}초 후 다시 시도</div>}
        <button disabled={isLocked} onClick={submit} className="w-full mt-3 py-3 rounded-xl bg-blue-300 disabled:bg-gray-200 font-bold">로그인</button>
      </div>
    </div>
  );
}

function computeProgress(rec, cls, date){
  let done=0;
  if(rec.arrival) done++;
  if(rec.selfStudy && rec.selfStudy.length>0) done++;
  const hw = rec.homework||[];
  if(hw.length>0 && hw.every(h=>h.done)) done++;
  if(rec.lunchBrushing?.checked) done++;
  const tt = rec.timetable||[];
  const filledPeriods = tt.filter(Boolean).length;
  const notes = rec.learningNotes||[];
  if(filledPeriods>0 && notes.filter(n=>n.content?.length>=10).length>=filledPeriods) done++; // 10자 이상 로직 유지
  return {done, percent: Math.round((done/5)*100)};
}
function computeCompleted(rec, cls, date){ return computeProgress(rec, cls, date).done===5; }

    next[idx] = {...next[idx], endTime:new Date().toISOString(), minutes: Math.max(1, Math.round((Date.now()-startMs)/60000)), memo};

/* ---------- 9-3) 숙제 ---------- */
function TabHomework({rec,update,notice,toast,cls}){
  const teacherHw = (notice.homework||[]).map(h=>({...h,fromTeacher:true}));
  const personal = (rec.homework||[]).filter(h=>!h.fromTeacher);
  const merged = useMemo(()=>{
    const cur = rec.homework||[];
    const result = teacherHw.map(t=>{
      const exist = cur.find(h=>h.fromTeacher && h.subject===t.subject && h.content===t.content);
      return {...t, done: exist?.done||false};
    });
    return [...result, ...personal];
  },[rec.homework, notice]);

  useEffect(()=>{ if(JSON.stringify(merged)!==JSON.stringify(rec.homework)) update({homework:merged}); },[]);

  const toggle = (i)=>{
    const next = [...(rec.homework||merged)];
    next[i] = {...next[i], done:!next[i].done};
    update({homework:next});
    if(next.every(h=>h.done) && next.length>0) toast('모두 완료! ⭐⭐⭐');
  };
  const [s,setS]=useState(''); const [c,setC]=useState('');
  const addPersonal = ()=>{
    if(!s||!c){toast('과목과 내용을 선택/입력해요');return;}
    update({homework:[...(rec.homework||merged), {subject:s,content:c,done:false,fromTeacher:false}]});
    setS('');setC('');
  };
  const removeAt = (i)=>{ const next=[...(rec.homework||merged)]; next.splice(i,1); update({homework:next}); };

  const all = rec.homework||merged; const allDone = all.length>0 && all.every(h=>h.done);

  return (
    <div className="pastel-card p-4">
      <h3 className="text-xl font-bold mb-2">✏️ 숙제</h3>
      {all.length===0 && <div className="text-gray-400">오늘 숙제가 없어요</div>}
      {all.map((h,i)=>(
        <label key={i} className={`flex items-center gap-2 p-2 mb-2 border-2 rounded-xl ${h.done?'bg-green-50':'bg-white'}`}>
          <input type="checkbox" checked={!!h.done} onChange={()=>toggle(i)} className="w-5 h-5"/>
          <div className="flex-1">
            <div className="text-xs text-gray-500">{h.fromTeacher?'📢 선생님':'👤 내가 추가'} {h.subject}</div>
            <div className={h.done?'line-through text-gray-400':''}>{h.content}</div>
          </div>
          {!h.fromTeacher && <button onClick={()=>removeAt(i)} className="text-red-400 text-sm">삭제</button>}
        </label>
      ))}
      {allDone && <div className="text-center text-2xl my-3 animate-bounce">⭐ 모두 끝! 잘했어요 ⭐</div>}
      <div className="mt-3 border-t pt-3">
        <div className="font-bold text-sm mb-2">+ 개인 학습 추가</div>
        <div className="flex gap-2">
          <select value={s} onChange={e=>setS(e.target.value)} className="border-2 rounded-xl p-2 w-32">
            <option value="">— 과목 —</option>
            {cls?.subjects?.map(subj => <option key={subj.name} value={subj.name}>{subj.name}</option>)}
            <option value="기타">기타</option>
          </select>
          <input value={c} onChange={e=>setC(e.target.value)} placeholder="내용" className="border-2 rounded-xl p-2 flex-1"/>
          <button onClick={addPersonal} className="px-3 rounded-xl bg-yellow-200">추가</button>
        </div>
      </div>
    </div>
  );
}

function TabStudentDash({recKey, student, currentDate, cls}) {
  const [allRec] = useSync(recKey, {});
  const [allNotice] = useSync('dailyNotice', {}); 
  
  const [startDate, setStartDate] = useState(() => {
    const d = new Date(currentDate); d.setDate(d.getDate() - 6); return todayStr(d);
  });
  const [endDate, setEndDate] = useState(currentDate);
  const [preset, setPreset] = useState('최근 7일');

  const handlePreset = (p) => {
    setPreset(p); const d = new Date(currentDate); let s, e;
    if(p === '오늘') { s = todayStr(d); e = todayStr(d); }
    else if(p === '이번 주') {
      const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
      s = todayStr(new Date(d.setDate(diff))); e = todayStr(new Date(new Date(s).setDate(new Date(s).getDate() + 6)));
    }
    else if(p === '최근 7일') { e = todayStr(d); s = todayStr(new Date(new Date(d).setDate(d.getDate() - 6))); }
    else if(p === '이번 달') { s = todayStr(new Date(d.getFullYear(), d.getMonth(), 1)); e = todayStr(new Date(d.getFullYear(), d.getMonth() + 1, 0)); }
    else if(p === '전체') { const keys = Object.keys(allRec).sort(); s = keys.length > 0 ? keys[0] : currentDate; e = currentDate; }
    if(s) setStartDate(s); if(e) setEndDate(e);
  };

  const dates = useMemo(() => {
    const arr = []; let curr = new Date(startDate); const end = new Date(endDate);
    while (curr <= end) { arr.push(todayStr(curr)); curr.setDate(curr.getDate() + 1); }
    return arr;
  }, [startDate, endDate]);

  let onTimeCount = 0; let lateCount = 0; let brushCount = 0;
  let hwDoneCount = 0; let hwTotalCount = 0; let totalStudyMin = 0;

  dates.forEach(d => {
    const r = allRec[d] || {};
    if(r.arrival) { if(hmToMin(r.arrival) <= hmToMin(cls.arrivalTarget || '08:50')) onTimeCount++; else lateCount++; }
    if(r.lunchBrushing?.checked) brushCount++;
    const teacherHw = ((allNotice[d]||{}).homework || []).map(h => ({...h, fromTeacher: true}));
    const recHw = r.homework || []; const personalHw = recHw.filter(h => !h.fromTeacher);
    const mergedHw = teacherHw.map(t => ({...t, done: recHw.find(h => h.fromTeacher && h.subject === t.subject && h.content === t.content)?.done || false}));
    const allDailyHw = [...mergedHw, ...personalHw];
    hwTotalCount += allDailyHw.length; hwDoneCount += allDailyHw.filter(h => h.done).length; 
    totalStudyMin += (r.selfStudy||[]).reduce((a,b)=>a+(b.minutes||0),0);
  });

  const maxStudy = Math.max(...dates.map(d=>(allRec[d]?.selfStudy||[]).reduce((a,b)=>a+(b.minutes||0),0)), 60);

  return (
    <div className="space-y-4">
      <div className="pastel-card p-4">
        <div className="flex justify-between items-center mb-3">
          <h3 className="text-lg font-bold">📅 통계 기간</h3><span className="text-xs text-gray-500">{dates.length}일</span>
        </div>
        <div className="flex flex-wrap gap-2 mb-3">
          {['오늘', '이번 주', '최근 7일', '이번 달', '전체'].map(p => (
            <button key={p} onClick={()=>handlePreset(p)} className={`px-3 py-1 text-sm rounded-full border ${preset===p ? 'bg-blue-600 text-white font-bold' : 'bg-white'}`}>{p}</button>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        <div className="pastel-card p-3 text-center bg-yellow-50"><div className="text-xs">⏱️ 누적 자습</div><div className="text-lg font-bold text-yellow-600">{totalStudyMin}분</div></div>
        <div className="pastel-card p-3 text-center bg-blue-50"><div className="text-xs">🏫 등교 준수</div><div className="text-lg font-bold text-blue-600">정상 {onTimeCount} / 지각 {lateCount}</div></div>
        <div className="pastel-card p-3 text-center bg-green-50"><div className="text-xs">🪥 점심 양치</div><div className="text-lg font-bold text-green-600">수행 {brushCount}회</div></div>
        <div className="pastel-card p-3 text-center bg-pink-50"><div className="text-xs">✏️ 숙제 수행</div><div className="text-lg font-bold text-pink-600">완료 {hwDoneCount} / {hwTotalCount}</div></div>
      </div>
    </div>
  );
}

/* ---------- PIN 변경 모달 ---------- */
function PinChangeModal({student, cls, setCls, onClose,toast}){
  const [old1,setOld]=useState(''); const [n1,setN1]=useState(''); const [n2,setN2]=useState('');
  const submit=async()=>{
    if(n1.length!==4||n2.length!==4){toast('4자리를 입력해요');return;}
    if(n1!==n2){toast('새 PIN이 서로 달라요');return;}
    const oldH=await sha256(old1);
    const c={...cls}; const i=c.students.findIndex(s=>s.id===student.id);
    if(c.students[i].pinHash!==oldH){toast('현재 PIN이 달라요');return;}
    c.students[i].pinHash=await sha256(n1); setCls(c);
    toast('PIN 변경 완료!'); onClose();
  };
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-40 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl p-5 w-full max-w-sm" onClick={e=>e.stopPropagation()}>
        <h3 className="text-lg font-bold mb-3">🔐 PIN 변경</h3>

        <input maxLength={4} value={n1} onChange={e=>setN1(e.target.value.replace(/\D/g,''))} placeholder="새 PIN" className="w-full p-2 border-2 rounded-xl mb-2"/>
        <input maxLength={4} value={n2} onChange={e=>setN2(e.target.value.replace(/\D/g,''))} placeholder="새 PIN 확인" className="w-full p-2 border-2 rounded-xl mb-3"/>
        <div className="flex gap-2">

          <button onClick={submit} className="flex-1 py-2 rounded-xl bg-pink-300 font-bold">변경</button>
        </div>

  );
}

function TDash({cls, date}){
  // 전체 학생 기록 변경 감지 트리거
  const [, forceRender] = useState(0);
  useEffect(() => {
    const unsubs = cls.students.map(s => Store.subscribe(`records_${s.id}`, () => forceRender(x=>x+1)));
    return () => unsubs.forEach(unsub => unsub());
  }, [cls.students]);

  const rows = cls.students.map(s=>{
    const r=Store.get(`records_${s.id}`,{})[date]||{};
    const flags = {
      arrival: !!r.arrival, self: (r.selfStudy||[]).length>0,
      hw: (r.homework||[]).length>0 && (r.homework||[]).every(h=>h.done),
      brush: !!r.lunchBrushing?.checked,
      note: (()=>{ const tt=r.timetable||[]; const n=(r.learningNotes||[]).filter(x=>x.content?.length>=10).length; const need=tt.filter(Boolean).length; return need>0 && n>=need;})()
    };
    return {s,flags,done:Object.values(flags).filter(Boolean).length, weather: r.weather||'', mood: r.mood||''};
  });
  const avg = rows.length > 0 ? Math.round(rows.reduce((x,y)=>x+y.done,0)/rows.length/5*100) : 0;
  return (
    <div className="pastel-card p-4">
      <h3 className="font-bold mb-2">📊 {date} 학급 평균 달성률: {avg}%</h3>
      <table className="w-full text-sm text-center">
        <thead><tr><th>번호</th><th>이름</th><th>등교</th><th>자습</th><th>숙제</th><th>양치</th><th>배움노트</th><th>달성</th></tr></thead>
        <tbody>
          {rows.map(({s,flags,done})=>(
            <tr key={s.id} className={done<3?'bg-red-50':''}>
              <td>{s.number}</td><td>{s.name}</td>
              <td>{flags.arrival?'✅':'·'}</td><td>{flags.self?'✅':'·'}</td>
              <td>{flags.hw?'✅':'·'}</td><td>{flags.brush?'✅':'·'}</td>
              <td>{flags.note?'✅':'·'}</td><td className="font-bold">{done}/5</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

        const snap = await window.dbRef.get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      }
      alert("모든 데이터가 초기화되었습니다."); window.location.reload();
    }
  };
  
  return (
    <div className="pastel-card p-4">
      <h3 className="font-bold mb-3">💾 전체 데이터 관리</h3>
      <div className="flex flex-wrap gap-2">
        <button onClick={migrateToFirebase} className="px-3 py-2 rounded-xl bg-purple-200 font-bold">🚀 기존 데이터 Firebase로 올리기</button>
        <button onClick={backup} className="px-3 py-2 rounded-xl bg-blue-200">💾 전체 JSON 백업</button>
        <button onClick={resetAllData} className="px-3 py-2 rounded-xl bg-red-500 text-white font-bold ml-auto">⚠️ 전체 초기화</button>
      </div>
    </div>
  );
}

function TStudents({cls,setCls,toast}){
  const [name,setName]=useState(''); const [number,setNumber]=useState(cls.nextStudentId||cls.students.length+1);
  const add=async()=>{
    if(!name) return;
    const c={...cls}; const id=c.nextStudentId||(c.students.length+1);
    c.students=[...c.students, {id,name,number:+number,avatar:AVATARS[id%AVATARS.length], pinHash:await sha256('0000'), isPinChanged:false, lastLogin:null}];
    c.nextStudentId=id+1; setCls(c); setName(''); setNumber(+number+1); toast('추가!');
  };
  return (
    <div className="space-y-3">
      <DataExport cls={cls} />
      <div className="pastel-card p-4">
        <h3 className="font-bold mb-2">+ 학생 추가</h3>
        <div className="flex gap-2"><input value={name} onChange={e=>setName(e.target.value)} placeholder="이름" className="border-2 p-2 rounded-xl"/><button onClick={add} className="px-3 rounded-xl bg-blue-300 font-bold">추가</button></div>
      </div>
      <div className="pastel-card p-4">
        <h3 className="font-bold mb-2">👥 학생 명단 ({cls.students.length}명)</h3>
        <table className="w-full text-sm text-left">
          <thead><tr><th>번호</th><th>이름</th><th>PIN상태</th></tr></thead>
          <tbody>
            {[...cls.students].sort((a,b)=>a.number-b.number).map(s=>(
              <tr key={s.id}><td>{s.number}</td><td>{s.avatar} {s.name}</td><td>{s.isPinChanged?'✅':'⚠️ 임시'}</td></tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
