<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>오늘의 학교생활 체크 - 실시간 연동</title>
<!-- 라이브러리 로드 -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#FFF8F0;}
  button{min-height:44px; transition: all 0.2s;}
  .btn-pad{font-size:1.6rem;padding:1rem;border-radius:1rem;background:#fff;border:2px solid #FCD5CE;}
  .btn-pad:active{transform:scale(.96);background:#FFE5D9}
  .pastel-card{background:#fff;border:2px solid #FFE5D9;border-radius:1.25rem;box-shadow:0 4px 0 #FCD5CE}
  .tab-btn{flex:1;padding:.65rem .25rem;font-size:.85rem;border-radius:.75rem;text-align:center}
  .tab-btn.active{background:#FFD6A5;font-weight:700}
  .toast{position:fixed;left:50%;top:1rem;transform:translateX(-50%);background:#333;color:#fff;padding:.6rem 1rem;border-radius:.75rem;z-index:100;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
  @media print{.no-print{display:none !important}.print-area{box-shadow:none;border:none;margin:0;padding:0}@page{size:A4;margin:12mm}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
/* =========================================================
   오늘의 학교생활 체크 — Firebase 실시간 연동 완성본
   ========================================================= */

// 1. 전달해주신 Firebase 설정 (databaseURL 포함)
const firebaseConfig = {
  apiKey: "AIzaSyCn8tqQqUnzf0GruEqExMcUOyqJUe14z_I",
  authDomain: "school-check-f9d0a.firebaseapp.com",
  databaseURL: "https://school-check-f9d0a-default-rtdb.firebaseio.com", 
  projectId: "school-check-f9d0a",
  storageBucket: "school-check-f9d0a.firebasestorage.app",
  messagingSenderId: "256211323289",
  appId: "1:256211323289:web:d437ab73d12c002bc6ab08"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ---------- 1) 유틸리티 & 클라우드 어댑터 ---------- */
async function sha256(str){
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let CloudData = {};

const LS = {
  get: (k, d=null) => {
    if(k === 'session' || k === 'loginFails' || k.startsWith('studentTT_')) {
      try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{return d;}
    }
    return CloudData[k] !== undefined ? JSON.parse(JSON.stringify(CloudData[k])) : d; 
  },
  set: (k, v) => {
    if(k === 'session' || k === 'loginFails' || k.startsWith('studentTT_')) {
      localStorage.setItem(k,JSON.stringify(v)); return;
    }
    CloudData[k] = v;
    db.ref(k).set(v); 
  },
  del: (k) => {
    if(k === 'session' || k === 'loginFails' || k.startsWith('studentTT_')) { localStorage.removeItem(k); return; }
    db.ref(k).remove();
  }
};

const todayStr = (d=new Date())=>{
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const dayKor = ['일','월','화','수','목','금','토'];
const weekLabel = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금'};
const weekKeys = ['mon','tue','wed','thu','fri'];
const nowHM = ()=>{ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const isoToLocalHM = (iso)=>{ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const hmToMin = (hm)=>{ if(!hm) return 0; const [h,m]=hm.split(':').map(Number); return h*60+m; };
const isoToLocalYMDHM = (iso) => {
  if (!iso) return '-'; const d = new Date(iso); if(isNaN(d)) return '-';
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};

const AVATARS = ['🐱','🐶','🦖','🐰','🐻','🐼','🦁','🐯','🐵','🦊','🐧','🐸'];
const ACTIVITY_TYPES = ['한자','영어','수학','독서','논술','만들기','그림그리기','기타'];

async function seedIfEmpty(){
  if(CloudData['class']) return;
  const teacherPasswordHash = await sha256('teacher123');
  const pin0 = await sha256('0000');
  const cls = {
    name:'3학년 2반', teacherPasswordHash, arrivalTarget:'08:50', lunchBrushTime:'13:00', brushNotice:'점심 먹고 양치 잊지 말기! 🪥',
    subjects: [
      {name:'국어',color:'#FFD6A5',icon:'📖'}, {name:'수학',color:'#A0E7E5',icon:'🔢'},
      {name:'사회',color:'#B5EAD7',icon:'🌏'}, {name:'과학',color:'#C7CEEA',icon:'🔬'},
      {name:'영어',color:'#FFC8DD',icon:'🔤'}, {name:'체육',color:'#FDFFB6',icon:'⚽'},
      {name:'음악',color:'#E0BBE4',icon:'🎵'}, {name:'미술',color:'#FFDAC1',icon:'🎨'},
    ],
    defaultTimetable: {
      mon:['국어','수학','사회','과학','영어','체육'], tue:['수학','국어','음악','미술','영어','체육'],
      wed:['국어','수학','과학','사회','체육','영어'], thu:['수학','국어','영어','미술','음악','체육'],
      fri:['국어','수학','사회','과학','체육','영어'],
    },
    students:[
      {id:1,name:'홍길동',number:1,avatar:'🐱',pinHash:pin0,isPinChanged:false,lastLogin:null},
      {id:2,name:'김영희',number:2,avatar:'🐰',pinHash:pin0,isPinChanged:false,lastLogin:null},
    ],
    nextStudentId:3
  };
  LS.set('class', cls);
}

/* ---------- 2) 메인 앱 루프 ---------- */
function App(){
  const [ready, setReady] = useState(false);
  const [session, setSession] = useState(LS.get('session'));
  const [view, setView] = useState('role');
  const [toastMsg, setToast] = useState('');
  const [, setTick] = useState(0);

  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(''), 1600); };

  useEffect(() => {
    const ref = db.ref('/');
    ref.on('value', async (snap) => {
      const val = snap.val() || {};
      CloudData = val;
      if (!val.class) await seedIfEmpty();
      setReady(true);
      setTick(t => t + 1);
    });
    return () => ref.off();
  }, []);

  const logout = () => { LS.del('session'); setSession(null); setView('role'); };

  if (!ready) return <div className="min-h-screen flex items-center justify-center text-xl font-bold p-8">서버와 연결 중... ☁️</div>;

  return (
    <div className="min-h-screen">
      {toastMsg && <div className="toast">{toastMsg}</div>}
      {view === 'role' && <RoleSelect onPick={(r)=>setView(r==='student'?'studentLogin':'teacherLogin')} />}
      {view === 'studentLogin' && <StudentLogin onLogged={(sess)=>{ LS.set('session', sess); setSession(sess); setView('studentApp'); }} toast={showToast} />}
      {view === 'teacherLogin' && <TeacherLogin onLogged={(sess)=>{ LS.set('session', sess); setSession(sess); setView('teacherApp'); }} toast={showToast} />}
      {view === 'studentApp' && session && <StudentApp session={session} logout={logout} toast={showToast} />}
      {view === 'teacherApp' && session && <TeacherApp session={session} logout={logout} toast={showToast} />}
    </div>
  );
}

/* ---------- 3) 공통 컴포넌트 (로그인/역할) ---------- */
function RoleSelect({onPick}){
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-orange-50/20">
      <h1 className="text-4xl font-black mb-2 text-orange-800">🌈 오늘의 학교생활</h1>
      <p className="text-gray-500 mb-10 text-lg">우리 반 친구들과 실시간으로 기록해요!</p>
      <div className="grid gap-5 w-full max-w-sm">
        <button onClick={()=>onPick('student')} className="pastel-card text-2xl py-12 bg-white hover:bg-orange-50 active:scale-95 transition-all">🧒 학생 로그인</button>
        <button onClick={()=>onPick('teacher')} className="pastel-card text-2xl py-12 bg-white hover:bg-blue-50 active:scale-95 transition-all">👩‍🏫 선생님 로그인</button>
      </div>
    </div>
  );
}

function StudentLogin({onLogged, toast}){
  const cls = LS.get('class', {students:[]});
  const [sel, setSel] = useState(null);
  const [pin, setPin] = useState('');

  const tryLogin = async () => {
    if(pin.length !== 4) { toast("PIN 4자리를 입력하세요."); return; }
    const h = await sha256(pin);
    if(h === sel.pinHash) {
      const cls2 = LS.get('class');
      const idx = cls2.students.findIndex(s=>s.id===sel.id);
      cls2.students[idx].lastLogin = new Date().toISOString();
      LS.set('class', cls2);
      onLogged({role:'student', studentId:sel.id, loginAtMs:Date.now()});
    } else { toast("PIN이 틀렸어요!"); setPin(''); }
  };

  return (
    <div className="p-4 max-w-2xl mx-auto">
      <h2 className="text-2xl font-bold mb-6 text-center">🧒 내 이름을 찾아주세요!</h2>
      {!sel ? (
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          {[...cls.students].sort((a,b)=>a.number-b.number).map(s=>(
            <button key={s.id} onClick={()=>setSel(s)} className="pastel-card p-4 text-left hover:bg-pink-50">
              <div className="text-3xl mb-1">{s.avatar}</div>
              <div className="text-sm text-gray-500">{s.number}번</div>
              <div className="text-lg font-bold">{s.name}</div>
            </button>
          ))}
        </div>
      ) : (
        <div className="max-w-xs mx-auto text-center mt-10">
          <div className="text-5xl mb-2">{sel.avatar}</div>
          <div className="text-2xl font-bold mb-6">{sel.name}</div>
          <div className="text-3xl tracking-widest mb-6 font-mono">{'●'.repeat(pin.length).padEnd(4,'○')}</div>
          <div className="grid grid-cols-3 gap-2">
            {[1,2,3,4,5,6,7,8,9,0].map(n=><button key={n} onClick={()=>pin.length<4 && setPin(p=>p+n)} className="btn-pad">{n}</button>)}
            <button onClick={()=>setPin('')} className="btn-pad text-sm">지움</button>
            <button onClick={tryLogin} className="col-span-2 bg-pink-300 rounded-xl font-bold text-xl">확인</button>
          </div>
          <button onClick={()=>setSel(null)} className="mt-8 text-gray-400 underline">이름 다시 고르기</button>
        </div>
      )}
    </div>
  );
}

function TeacherLogin({onLogged, toast}){
  const [pw, setPw] = useState('');
  const cls = LS.get('class', {teacherPasswordHash:''});
  const submit = async () => {
    const h = await sha256(pw);
    if(h === cls.teacherPasswordHash) onLogged({role:'teacher', loginAtMs:Date.now()});
    else toast("비밀번호가 틀렸습니다.");
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-6 bg-blue-50/20">
      <div className="pastel-card p-8 w-full max-w-sm flex flex-col gap-4">
        <h2 className="text-2xl font-bold text-blue-800">👩‍🏫 관리자 로그인</h2>
        <input type="password" value={pw} onKeyDown={e=>e.key==='Enter' && submit()} onChange={e=>setPw(e.target.value)} className="border-2 p-3 rounded-xl focus:border-blue-400 outline-none" placeholder="비밀번호"/>
        <button onClick={submit} className="bg-blue-400 text-white py-3 rounded-xl font-bold text-lg">입장하기</button>
      </div>
    </div>
  );
}

/* ---------- 4) 학생 전용 기능 ---------- */
function StudentApp({session, logout, toast}){
  const [tab, setTab] = useState('arrival');
  const [date, setDate] = useState(todayStr());
  const cls = LS.get('class');
  const student = cls.students.find(s=>s.id===session.studentId);
  const rec = LS.get(`records_${student.id}`, {})[date] || {arrival:'', weather:'', selfStudy:[], learningNotes:[], homework:[], lunchBrushing:{checked:false}};

  const update = (patch) => {
    const all = LS.get(`records_${student.id}`, {});
    all[date] = { ...rec, ...patch };
    LS.set(`records_${student.id}`, all);
  };

  const progress = useMemo(()=>{
    let done = 0;
    if(rec.arrival) done++;
    if(rec.selfStudy?.length > 0) done++;
    if(rec.lunchBrushing?.checked) done++;
    const tt = rec.timetable || [];
    const notes = rec.learningNotes || [];
    // 10자 이상 룰 적용
    if(tt.filter(Boolean).length > 0 && notes.filter(n=>n.content?.length >= 10).length >= tt.filter(Boolean).length) done++;
    const hw = rec.homework || [];
    if(hw.length > 0 && hw.every(h=>h.done)) done++;
    return {done, percent: Math.round((done/5)*100)};
  }, [rec]);

  return (
    <div className="p-4 max-w-3xl mx-auto pb-20">
      <header className="flex items-center gap-3 mb-6">
        <div className="text-4xl">{student.avatar}</div>
        <div className="flex-1">
          <div className="text-xl font-bold">{student.name} ({student.number}번)</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="text-sm bg-transparent border-b-2 border-orange-200 outline-none"/>
        </div>
        <button onClick={logout} className="text-xs px-2 py-1 border rounded bg-white text-gray-500">로그아웃</button>
      </header>

      <div className="pastel-card p-3 mb-6 bg-gradient-to-r from-orange-50 to-pink-50">
        <div className="flex justify-between text-sm mb-1 font-bold"><span>오늘의 미션</span><span>{progress.percent}%</span></div>
        <div className="h-4 bg-white/50 rounded-full overflow-hidden border border-white"><div className="h-full bg-gradient-to-r from-yellow-300 to-pink-400 transition-all" style={{width:`${progress.percent}%`}}/></div>
      </div>

      <div className="flex gap-1 mb-6 overflow-x-auto no-print">
        {[{id:'arrival',l:'🏫 등교'}, {id:'self',l:'📚 자습'}, {id:'brush',l:'🪥 양치'}, {id:'tt',l:'🗓️ 시간표'}, {id:'note',l:'📝 배움노트'}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} className={`tab-btn whitespace-nowrap min-w-[75px] ${tab===t.id?'active':'bg-white border text-gray-400'}`}>{t.l}</button>
        )}
      </div>

      {tab === 'arrival' && <div className="pastel-card p-6 flex flex-col gap-5">
        <h3 className="font-bold text-lg">🏫 언제 학교에 왔나요?</h3>
        <div className="flex gap-2"><input type="time" value={rec.arrival} onChange={e=>update({arrival:e.target.value})} className="text-3xl p-3 border-2 rounded-2xl flex-1 text-center"/><button onClick={()=>update({arrival:nowHM()})} className="bg-yellow-200 px-4 rounded-2xl font-bold">지금</button></div>
        <h3 className="font-bold text-lg">☁️ 지금 내 마음의 날씨는?</h3>
        <div className="flex justify-between p-2 border-2 rounded-2xl">{['☀️','⛅','☁️','🌧️','⚡'].map(w=><button key={w} onClick={()=>update({weather:w})} className={`text-3xl p-2 rounded-xl ${rec.weather===w?'bg-blue-100 border-blue-300 border':'border border-transparent'}`}>{w}</button>)}</div>
      </div>}

      {tab === 'brush' && <div className="pastel-card p-8 text-center flex flex-col gap-6">
        <h3 className="text-xl font-bold">🪥 점심 먹고 양치했나요?</h3>
        <button onClick={()=>update({lunchBrushing:{checked:!rec.lunchBrushing.checked, checkedAt:new Date().toISOString()}})} className={`py-12 rounded-3xl text-5xl transition-all ${rec.lunchBrushing.checked?'bg-green-100 border-green-400 border-2':'bg-gray-100 border-2 border-transparent'}`}>{rec.lunchBrushing.checked?'✅ 양치 완료!':'🪥 버튼 클릭'}</button>
      </div>}

      {tab === 'tt' && <TabTimetable rec={rec} update={update} cls={cls} date={date} toast={toast}/>}
      {tab === 'note' && <TabLearningNote rec={rec} update={update} cls={cls}/>}
      {tab === 'self' && <TabSelfStudy rec={rec} update={update} toast={toast}/>}
    </div>
  );
}

/* ---------- 5) 세부 기능 탭 (학생) ---------- */
function TabTimetable({rec, update, cls, date}){
  const d = new Date(date);
  const dKey = weekKeys[d.getDay()-1] || 'mon';
  useEffect(()=>{
    if(!rec.timetable || rec.timetable.length === 0){
      update({timetable: [...(cls.defaultTimetable[dKey] || [])]});
    }
  }, [date]);

  const setP = (i, v)=>{
    const next = [...(rec.timetable || ['', '', '', '', '', ''])];
    next[i] = v;
    update({timetable: next});
  };

  return (
    <div className="pastel-card p-6">
      <h3 className="font-bold mb-4">🗓️ 오늘 시간표를 확인해요</h3>
      <div className="space-y-2">
        {[1,2,3,4,5,6].map(p=>(
          <div key={p} className="flex items-center gap-2">
            <span className="w-10 font-bold text-orange-600">{p}교시</span>
            <select value={(rec.timetable||[])[p-1]||''} onChange={e=>setP(p-1, e.target.value)} className="flex-1 p-3 border-2 rounded-xl outline-none">
              <option value="">— 과목 선택 —</option>
              {cls.subjects.map(s=><option key={s.name} value={s.name}>{s.icon} {s.name}</option>)}
            </select>
          </div>
        ))}
      </div>
    </div>
  );
}

function TabLearningNote({rec, update, cls}){
  const tt = rec.timetable || [];
  const notes = rec.learningNotes || [];
  
  const setNote = (p, content)=>{
    const next = [...notes];
    const i = next.findIndex(n=>n.period === p);
    if(i>=0) next[i] = {period: p, subject: tt[p-1], content};
    else next.push({period: p, subject: tt[p-1], content});
    update({learningNotes: next});
  };

  return (
    <div className="space-y-4">
      {tt.map((subj, idx) => {
        if(!subj) return null;
        const p = idx + 1;
        const content = notes.find(n=>n.period===p)?.content || '';
        const ok = content.length >= 10;
        return (
          <div key={p} className="pastel-card p-5">
            <div className="flex justify-between items-center mb-2">
              <div className="font-bold">{p}교시 · <span className="text-orange-600">{subj}</span></div>
              {ok && <span className="text-green-500 font-bold">✅ 완료</span>}
            </div>
            <textarea value={content} onChange={e=>setNote(p, e.target.value)} placeholder="오늘 무엇을 배웠나요? (10자 이상 적어보세요!)" className="w-full border-2 rounded-xl p-3 h-24 outline-none focus:border-orange-300"/>
            <div className="text-right text-xs text-gray-400 mt-1">{content.length}자</div>
          </div>
        );
      })}
      {tt.filter(Boolean).length === 0 && <div className="text-center p-10 text-gray-400">시간표를 먼저 설정해주세요!</div>}
    </div>
  );
}

function TabSelfStudy({rec, update, toast}){
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const timerRef = useRef(null);

  const start = ()=>{
    if(running) return;
    setRunning(true);
    const startIso = new Date().toISOString();
    timerRef.current = setInterval(()=>setElapsed(prev => prev + 1), 1000);
    update({selfStudy: [...(rec.selfStudy||[]), {type:'독서', startTime: startIso, endTime:null}]});
  };

  const stop = ()=>{
    clearInterval(timerRef.current);
    setRunning(false);
    const next = [...(rec.selfStudy||[])];
    const idx = next.findIndex(x=>!x.endTime);
    if(idx >= 0){
      next[idx].endTime = new Date().toISOString();
      next[idx].minutes = Math.max(1, Math.round(elapsed / 60));
    }
    update({selfStudy: next});
    setElapsed(0);
    toast("기록 완료! 고생했어요 ⭐");
  };

  return (
    <div className="pastel-card p-8 text-center flex flex-col gap-6">
      <h3 className="text-xl font-bold">📚 스스로 공부 시간</h3>
      <div className="text-6xl font-mono py-6 bg-slate-50 rounded-3xl border-2 border-dashed">{Math.floor(elapsed/60).toString().padStart(2,'0')}:{ (elapsed%60).toString().padStart(2,'0') }</div>
      {!running ? (
        <button onClick={start} className="bg-green-400 text-white py-6 rounded-3xl text-2xl font-bold shadow-lg shadow-green-100">▶ 활동 시작</button>
      ) : (
        <button onClick={stop} className="bg-red-400 text-white py-6 rounded-3xl text-2xl font-bold shadow-lg shadow-red-100">■ 활동 종료</button>
      )}
    </div>
  );
}

/* ---------- 6) 선생님 앱 (데이터 관리 & 마이그레이션) ---------- */
function TeacherApp({logout, toast}){
  const [tab, setTab] = useState('dash');
  const cls = LS.get('class', {students:[], name:'3학년 2반'});
  const [date, setDate] = useState(todayStr());

  // 🚀 [마이그레이션] 기기 데이터를 클라우드로 강제 복사
  const runMigration = () => {
    if(!confirm("⚠️ 현재 기기의 데이터를 클라우드(실시간 서버)로 전송하시겠습니까? 기존 서버 데이터는 덮어씌워집니다.")) return;
    try {
      const keys = ['class', 'dailyNotice'];
      cls.students.forEach(s => keys.push(`records_${s.id}`));
      keys.forEach(k => {
        const localVal = localStorage.getItem(k);
        if(localVal) db.ref(k).set(JSON.parse(localVal));
      });
      alert("전송 완료! 이제 학생들의 기기에서도 실시간으로 데이터가 보입니다.");
    } catch(e) { alert("오류: " + e.message); }
  };

  return (
    <div className="p-4 max-w-6xl mx-auto pb-20">
      <header className="flex justify-between items-center mb-6 border-b pb-4">
        <h1 className="text-2xl font-black text-blue-900">{cls.name} 관리자</h1>
        <div className="flex gap-2">
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="border p-2 rounded-xl text-sm font-bold"/>
          <button onClick={logout} className="border-2 p-2 rounded-xl text-xs font-bold text-gray-500">로그아웃</button>
        </div>
      </header>

      <div className="flex gap-2 mb-8 no-print">
        {[{id:'dash',l:'📊 대시보드'},{id:'note',l:'📝 배움노트'},{id:'manage',l:'⚙️ 학급관리'}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 py-3 rounded-2xl font-bold border-2 transition-all ${tab===t.id?'bg-blue-600 text-white border-blue-600':'bg-white text-gray-400 border-gray-100 hover:border-blue-100'}`}>{t.l}</button>
        )}
      </div>

      {tab === 'dash' && <TeacherDash date={date} cls={cls} />}
      {tab === 'note' && <TeacherNotes date={date} cls={cls} />}
      {tab === 'manage' && (
        <div className="space-y-6">
          <div className="pastel-card p-6 bg-blue-50 border-blue-200">
            <h3 className="font-bold text-blue-800 text-lg mb-2">☁️ 클라우드 데이터 전송 (처음 1회 권장)</h3>
            <p className="text-sm text-blue-600 mb-4">현재 이 PC(localStorage)에 저장된 학생 명단과 기록을 서버로 업로드합니다. 학생들이 자기 폰으로 접속하기 전에 이 버튼을 눌러주세요.</p>
            <button onClick={runMigration} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">데이터 마이그레이션 실행</button>
          </div>
          <TeacherStudentList cls={cls} toast={toast} />
        </div>
      )}
    </div>
  );
}

function TeacherDash({date, cls}){
  return (
    <div className="pastel-card p-4 overflow-x-auto">
      <table className="w-full text-sm text-center">
        <thead className="bg-slate-50 text-gray-600 uppercase text-xs">
          <tr><th className="py-3 px-2">번호</th><th className="px-2">이름</th><th>등교</th><th>기분</th><th>양치</th><th>공부(분)</th><th>미션</th></tr>
        </thead>
        <tbody>
          {cls.students.map(s => {
            const r = (CloudData[`records_${s.id}`]||{})[date] || {};
            const doneCount = (r.arrival?1:0) + (r.lunchBrushing?.checked?1:0) + (r.selfStudy?.length>0?1:0);
            return (
              <tr key={s.id} className="border-t hover:bg-slate-50">
                <td className="py-4 font-bold">{s.number}</td>
                <td className="font-bold">{s.avatar} {s.name}</td>
                <td className="text-blue-600">{r.arrival || '-'}</td>
                <td className="text-2xl">{r.weather || '-'}</td>
                <td>{r.lunchBrushing?.checked ? '✅' : '❌'}</td>
                <td>{(r.selfStudy||[]).reduce((a,b)=>a+(b.minutes||0),0)}분</td>
                <td className="font-bold text-orange-600">{doneCount}/5</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function TeacherNotes({date, cls}){
  return (
    <div className="space-y-3">
      {cls.students.map(s => {
        const r = (CloudData[`records_${s.id}`]||{})[date] || {};
        const notes = r.learningNotes || [];
        if(notes.length === 0) return null;
        return (
          <details key={s.id} className="pastel-card p-4">
            <summary className="cursor-pointer font-bold">{s.avatar} {s.name} - {notes.length}과목 작성</summary>
            <div className="grid gap-2 mt-3 pl-4">
              {notes.map((n, i) => (
                <div key={i} className="text-sm bg-slate-50 p-2 rounded-lg">
                  <span className="font-bold text-orange-600">[{n.subject}]</span> {n.content}
                </div>
              ))}
            </div>
          </details>
        );
      })}
    </div>
  );
}

function TeacherStudentList({cls, toast}){
  const [name, setName] = useState('');
  const [num, setNum] = useState(cls.nextStudentId);

  const add = async () => {
    if(!name) return;
    const c = LS.get('class');
    c.students.push({id: c.nextStudentId, name, number: +num, avatar: AVATARS[c.nextStudentId%AVATARS.length], pinHash: await sha256('0000'), isPinChanged: false});
    c.nextStudentId++;
    LS.set('class', c);
    setName(''); setNum(c.nextStudentId);
    toast("추가 완료! (임시 PIN: 0000)");
  };

  return (
    <div className="pastel-card p-6">
      <h3 className="font-bold text-lg mb-4">👥 학생 명단 관리</h3>
      <div className="flex gap-2 mb-6">
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="이름" className="border-2 p-2 rounded-xl flex-1"/>
        <input type="number" value={num} onChange={e=>setNum(e.target.value)} className="border-2 p-2 rounded-xl w-20"/>
        <button onClick={add} className="bg-orange-300 px-4 rounded-xl font-bold">추가</button>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        {cls.students.map(s=><div key={s.id} className="bg-slate-50 p-2 rounded-lg text-sm text-center">{s.number}. {s.name}</div>)}
      </div>
    </div>
  );
}

/* ---------- 부트스트랩 ---------- */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
